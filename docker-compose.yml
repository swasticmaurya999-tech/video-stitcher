# One-command local run:  docker compose up --build
# Then open http://localhost:8000  (works fully offline — heuristic planner + local storage).
services:
  app:
    build:
      context: .
      args:
        INSTALL_ML: "0"          # set to "1" to enable CLIP/object-detection (pulls torch)
    ports:
      - "8090:8000"
    # Load ALL config + secrets from .env (STORAGE_BACKEND, R2_*, GEMINI/GROQ keys, limits).
    env_file: .env
    environment:
      PORT: "8000"
      # Whisper now ON (honoring .env) for real understanding — speech-aware cuts + genre detection.
    volumes:
      - ./data:/app/data
